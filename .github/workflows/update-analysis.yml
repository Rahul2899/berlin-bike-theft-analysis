name: Daily Analysis Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest Berlin Police data
        run: |
          mkdir -p data/raw
          curl -L "https://www.polizei-berlin.eu/Fahrraddiebstahl/Fahrraddiebstahl.csv" -o data/raw/Fahrraddiebstahl.csv
          echo "✓ Data downloaded successfully"
          ls -lh data/raw/Fahrraddiebstahl.csv

      - name: Run data cleaning pipeline
        run: |
          echo "=== Cleaning data ==="
          python scripts/02_data_cleaning.py

      - name: Run exploratory analysis
        run: |
          echo "=== Running EDA ==="
          python scripts/03_eda.py

      - name: Run final analysis
        run: |
          echo "=== Running final analysis ==="
          python src/analysis.py > analysis_latest.txt
          echo "✓ Analysis complete"

      - name: Summary
        run: |
          echo "✅ Analysis Complete"
          echo "Data: $(wc -l < data/processed/geocoded_data.csv) records"
          echo "$(cat analysis_latest.txt)"

  notify-success:
    runs-on: ubuntu-latest
    needs: update-analysis
    if: success()
    steps:
      - name: Success notification
        run: echo "✅ Daily analysis update completed successfully"

  notify-failure:
    runs-on: ubuntu-latest
    needs: update-analysis
    if: failure()
    steps:
      - name: Failure notification
        run: echo "❌ Daily analysis update failed - check logs"

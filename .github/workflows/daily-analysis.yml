name: Daily Bike Theft Analysis

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - run: pip install -r requirements.txt
      
      - run: |
          mkdir -p data/raw
          curl -L "https://www.polizei-berlin.eu/Fahrraddiebstahl/Fahrraddiebstahl.csv" \
            -o data/raw/Fahrraddiebstahl.csv
      
      - run: python scripts/02_data_cleaning.py
      
      - run: python scripts/03_eda.py
      
      - run: python src/analysis.py > analysis_latest.txt
      
      - run: python scripts/06_generate_visualizations.py
      
      - run: python scripts/07_create_animated_videos.py
      
      - run: python scripts/05_update_documentation.py
      
      - name: Check if anything changed
        id: check-changes
        run: |
          if git diff --quiet data/processed/geocoded_data.csv README.md ANALYSIS.md visualizations/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push all updates
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/geocoded_data.csv README.md ANALYSIS.md visualizations/ analysis_latest.txt
          git commit -m "Auto-update: Latest Berlin bike theft analysis, visualizations & animations ($(date +'%Y-%m-%d'))"
          git push
      
      - name: Create Release
        if: steps.check-changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: data-$(date +'%Y-%m-%d')
          name: Data Update - $(date +'%Y-%m-%d')
          body: |
            ## 🚴 Automatic Analysis Update
            
            **Date:** $(date +'%Y-%m-%d')
            **Records:** $(wc -l < data/processed/geocoded_data.csv)
            
            Complete Berlin bike theft analysis with auto-generated visualizations & animations.
            
            ### What's Updated
            - ✅ Latest police data (auto-downloaded & processed)
            - ✅ README.md with updated statistics
            - ✅ ANALYSIS.md with latest findings
            - ✅ 4 professional static visualizations
            - ✅ 2 animated visualizations (GIFs)
            - ✅ All documentation auto-updated
          files: |
            data/processed/geocoded_data.csv
            analysis_latest.txt
            visualizations/viz_1_peak_hour_expert.png
            visualizations/viz_2_weekday_expert.png
            visualizations/viz_3_bike_value_expert.png
            visualizations/viz_4_success_rate_expert.png
            visualizations/animated_peak_hours.gif
            visualizations/animated_weekday_comparison.gif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: All updates complete
        if: steps.check-changes.outputs.changed == 'false'
        run: echo "✓ Data and visualizations already up-to-date"

name: Daily Bike Theft Analysis

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - run: pip install -r requirements.txt
      
      - run: |
          mkdir -p data/raw
          curl -L "https://www.polizei-berlin.eu/Fahrraddiebstahl/Fahrraddiebstahl.csv" \
            -o data/raw/Fahrraddiebstahl.csv
      
      - run: python scripts/02_data_cleaning.py
      
      - run: python scripts/03_eda.py
      
      - run: python src/analysis.py
      
      - run: echo "✅ Analysis complete"
